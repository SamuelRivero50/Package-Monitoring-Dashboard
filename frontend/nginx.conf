server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path returns index.html so Vue Router
    # can take over client-side. Static assets keep their normal 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed Vite assets (filename includes a content hash).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
